<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoyaltyChess - Welcome</title>
    <style>
        /* 1. ARKA PLAN VE ANA DÜZEN */
        body { 
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.8)), 
                              url('https://raw.githubusercontent.com/valium35/loyaltychess/refs/heads/main/logo.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-color: #121212;

            color: white; 
            text-align: center; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }

        /* 2. ANİMASYON TANIMLARI */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Başlangıçta öğeleri gizle ve animasyonu hazırla */
        .reveal {
            opacity: 0;
            animation: fadeInUp 1s ease-out forwards;
        }

        /* 3. ÖĞE GECİKMELERİ (Resim göründükten sonra sırayla gelecekler) */
        h1 { 
            font-size: 4rem; 
            letter-spacing: 8px; 
            color: #f1c40f; 
            margin-bottom: 10px;
            font-weight: 900;
            text-shadow: 0 5px 15px rgba(0,0,0,0.5);
            animation-delay: 0.8s; /* Resimden 0.8 saniye sonra */
        }

        h1 span { color: #ffffff; font-weight: 300; }

        p { 
            font-size: 1.2rem; 
            color: #ddd; 
            margin-bottom: 40px; 
            max-width: 600px;
            line-height: 1.6;
            animation-delay: 1.2s; /* Başlıktan biraz sonra */
        }

        .btn-container {
            display: flex; 
            gap: 20px; 
            justify-content: center;
            animation-delay: 1.6s; /* En son butonlar */
        }

        /* 4. BUTON TASARIMI */
        .btn { 
            padding: 18px 35px; 
            background: #f1c40f; 
            color: #121212; 
            text-decoration: none; 
            font-weight: bold; 
            border: none;
            border-radius: 50px; 
            font-size: 1.1rem; 
            transition: all 0.3s ease; 
            box-shadow: 0 10px 20px rgba(241, 196, 15, 0.2);
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn:hover { 
            background: #ffffff; 
            transform: translateY(-5px); 
            box-shadow: 0 15px 30px rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; letter-spacing: 4px; }
            .btn-container { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>

    <h1 class="reveal">LOYALTY<span>CHESS</span></h1>
    
    <p id="welcome-text" class="reveal">
        Welcome to the only chess arena where betrayal is the rule. <br>
        If you are ready, make your move.
    </p>
    
    <div class="btn-container reveal">
        <button onclick="startWithLang('tr')" class="btn">TÜRKÇE OYNA 🇹🇷</button>
        <button onclick="startWithLang('en')" class="btn">PLAY ENGLISH 🇺🇸</button>
    </div>

    <script>
        function startWithLang(lang) {
            localStorage.setItem('gameLang', lang);
            window.location.href = 'home.html';
        }

        // Sayfa yüklendiğinde metni dile göre anlık değiştirmek istersen (opsiyonel)
        // Şimdilik ana metni İngilizce yaptım çünkü global bir arena vurgusu verdik.
    </script>

</body>
</html>
