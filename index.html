<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoyaltyChess - Hoş Geldiniz</title>
    <style>
        body { 
            background: #121212; 
            color: white; 
            text-align: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }

        h1 { 
            font-size: 4rem; 
            letter-spacing: 8px; 
            color: #f1c40f; 
            margin-bottom: 10px;
            font-weight: 900;
        }

        h1 span { color: #ffffff; font-weight: 300; }

        p { 
            font-size: 1.2rem; 
            color: #aaa; 
            margin-bottom: 40px; 
            max-width: 600px;
        }

       <div style="display: flex; gap: 20px; justify-content: center;">
    <button onclick="startWithLang('tr')" class="btn">TÜRKÇE OYNA 🇹🇷</button>
    <button onclick="startWithLang('en')" class="btn">PLAY ENGLISH 🇺🇸</button>
</div>

<script>
function startWithLang(lang) {
    // Oyuncunun seçimini tarayıcı hafızasına (localStorage) kaydediyoruz
    localStorage.setItem('gameLang', lang);
    // Seçim yapıldıktan sonra oyun sayfasına (home.html) yönlendiriyoruz
    window.location.href = 'home.html';
}
</script>
    </style>
</head>
<body>
    <h1>LOYALTY<span>CHESS</span></h1>
    <p>İhanetin kural olduğu tek satranç arenasına hoş geldiniz. Hazırsanız hamlenizi yapın.</p>
    
    <a href="home.html" class="btn">OYUNA BAŞLA</a>
</body>
</html>
