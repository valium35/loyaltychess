<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoyaltyChess - Hoş Geldiniz</title>
    <style>
        body { 
            /* Arka Plan Ayarları */
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                              url('https://raw.githubusercontent.com/valium35/loyaltychess/refs/heads/main/logo.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-color: #121212; /* Resim yüklenene kadar yedek renk */

            /* Sayfa Düzeni */
            color: white; 
            text-align: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; /* Kaydırma çubuğunu gizle */
        }

        h1 { 
            font-size: 4rem; 
            letter-spacing: 8px; 
            color: #f1c40f; 
            margin-bottom: 10px;
            font-weight: 900;
            text-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        h1 span { color: #ffffff; font-weight: 300; }

        p { 
            font-size: 1.2rem; 
            color: #ddd; 
            margin-bottom: 40px; 
            max-width: 600px;
            line-height: 1.6;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8);
        }

        .btn-container {
            display: flex; 
            gap: 20px; 
            justify-content: center;
        }

        .btn { 
            padding: 18px 35px; 
            background: #f1c40f; 
            color: #121212; 
            text-decoration: none; 
            font-weight: bold; 
            border: none;
            border-radius: 50px; 
            font-size: 1.1rem; 
            transition: all 0.3s ease; 
            box-shadow: 0 10px 20px rgba(241, 196, 15, 0.2);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover { 
            background: #ffffff; 
            color: #121212;
            transform: translateY(-5px); 
            box-shadow: 0 15px 30px rgba(255, 255, 255, 0.2);
        }

        /* Mobil cihazlar için uyum */
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; letter-spacing: 4px; }
            .btn-container { flex-direction: column; gap: 15px; }
            p { font-size: 1rem; padding: 0 20px; }
        }
    </style>
</head>
<body>

    <h1>LOYALTY<span>CHESS</span></h1>
    <p id="welcome-text">İhanetin kural olduğu tek satranç arenasına hoş geldiniz. Hazırsanız hamlenizi yapın.</p>
    
    <div class="btn-container">
        <button onclick="startWithLang('tr')" class="btn">TÜRKÇE OYNA 🇹🇷</button>
        <button onclick="startWithLang('en')" class="btn">PLAY ENGLISH 🇺🇸</button>
    </div>

    <script>
        function startWithLang(lang) {
            // Seçimi kaydet
            localStorage.setItem('gameLang', lang);
            // Oyun sayfasına yönlendir
            window.location.href = 'home.html';
        }
    </script>

</body>
</html>
