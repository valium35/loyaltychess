<h1 id="main-title" class="reveal">LOYALTY<span>CHESS</span></h1>
<p id="main-tagline" class="tagline reveal">The only arena where betrayal is a legal move.</p>

<div class="rules-container reveal">
    <div class="rule-card">
        <h3 id="home-rule-1-title">⚡ 1. Active Threat</h3>
        <p id="home-rule-1-desc">...</p>
    </div>
    <div class="rule-card">
        <h3 id="home-rule-2-title">🔄 2. The Choice</h3>
        <p id="home-rule-2-desc">...</p>
    </div>
    <div class="rule-card">
        <h3 id="home-rule-3-title">💨 3. Final Mission</h3>
        <p id="home-rule-3-desc">...</p>
    </div>
</div>

<div class="btn-container reveal">
    <button onclick="startWithLang('tr')" class="btn">TÜRKÇE OYNA 🇹🇷</button>
    <button onclick="startWithLang('en')" class="btn">PLAY ENGLISH 🇺🇸</button>
</div>

<script src="translations.js"></script> 
<script>
    function applyHomeLanguage() {
        if (typeof LoyaltyDict === 'undefined') return;
        const lang = localStorage.getItem('gameLang') || 'tr';
        const t = LoyaltyDict[lang];

        if (t) {
            // Başlık ve Tagline (translations.js'ye bunları da ekleyebilirsin veya sabit tutabilirsin)
            // Kurallar (PvP sayfasındaki kuralları burada da kullanıyoruz)
            for (let i = 0; i < 3; i++) {
                const el = document.getElementById(`home-rule-${i+1}-desc`);
                if (el) el.innerText = t.rules[i];
            }
        }
    }

    function startWithLang(lang) {
        localStorage.setItem('gameLang', lang);
        // Seçim anında sayfayı güncelle (görsel geri bildirim için)
        applyHomeLanguage(); 
        // 0.5 saniye sonra yönlendir (kullanıcı değişimi görsün)
        setTimeout(() => {
            window.location.href = 'vs_player.html'; 
        }, 300);
    }

    // Sayfa açıldığında dili kontrol et
    window.onload = applyHomeLanguage;
</script>
