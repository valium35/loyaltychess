<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Multiverse - Choose Your Universe</title>
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }

        /* Üst Başlık */
        .main-header {
            position: absolute; top: 8%; left: 50%; transform: translate(-50%, -50%);
            z-index: 10; color: #f1c40f; font-size: clamp(1.5rem, 5vw, 2.5rem); 
            font-weight: 900; letter-spacing: 5px; text-transform: uppercase; 
            text-shadow: 0 0 20px rgba(0,0,0,0.9); pointer-events: none; 
            text-align: center; width: 100%;
        }

        .multiverse-container { display: flex; height: 100vh; width: 100vw; }

        /* Ortak Panel Stili */
        .universe-panel {
            flex: 1; position: relative; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none; overflow: hidden; border: 1px solid rgba(255,255,255,0.05);
        }

        /* Arka Plan Resimleri */
        .bg-image {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            filter: grayscale(80%) brightness(0.3); transition: 0.8s ease; z-index: 1;
        }

        /* Sol Taraf: Loyalty (Üstte Kalacak) */
        .loyalty .bg-image { background-image: url('logo1.jpg'); }
        /* Sağ Taraf: Foresight (Altta Kalacak) */
        .foresight .bg-image { background-image: url('logo2.jpg'); }

        .content { position: relative; z-index: 2; text-align: center; pointer-events: none; }
        .content h2 { font-size: clamp(1.2rem, 4vw, 2rem); color: #fff; margin-bottom: 20px; letter-spacing: 3px; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }

        .btn {
            padding: 12px 35px; background: rgba(241, 196, 15, 0.9); color: #121212;
            font-weight: bold; border-radius: 50px; text-transform: uppercase;
            letter-spacing: 2px; border: 2px solid transparent; transition: 0.3s;
            pointer-events: auto; font-size: 0.9rem;
        }

        /* Hover Etkileri (Masaüstü için) */
        .universe-panel:hover .bg-image { filter: grayscale(0%) brightness(0.7) scale(1.1); }
        .universe-panel:hover { flex: 1.4; box-shadow: inset 0 0 100px rgba(241, 196, 15, 0.2); }
        .btn:hover { background: #fff; transform: scale(1.1); box-shadow: 0 0 25px #f1c40f; }

        /* MOBİL AYARLAR (Tablet ve Telefon) */
        @media (max-width: 850px) {
            .multiverse-container { flex-direction: column; } /* Yan yana olanı alt alta çevirir */
            
            .universe-panel { width: 100%; height: 50vh; } /* Her panel ekranın yarısını kaplar */
            
            .universe-panel:hover { flex: 1.8; } /* Dokunulduğunda o taraf daha çok büyür */
            
            .main-header { top: 50%; font-size: 1.2rem; background: rgba(0,0,0,0.4); padding: 10px 0; }
        }

        /* Kilitli Panel */
        .locked { cursor: not-allowed; }
        .locked .btn { background: #333; color: #777; border-color: #222; }
        .locked:hover { flex: 1; }
        .locked:hover .bg-image { filter: grayscale(100%) brightness(0.15); }

        .tag-soon { font-size: 0.7rem; background: #e74c3c; padding: 3px 8px; border-radius: 4px; vertical-align: middle; margin-left: 8px; color: white; }
    </style>
</head>
<body>

    <div class="main-header">Choose Your Universe</div>

    <div class="multiverse-container">
        
        <a href="loyalty/index.html" class="universe-panel loyalty">
            <div class="bg-image"></div>
            <div class="content">
                <h2>LOYALTY CHESS</h2>
                <div class="btn">Enter Arena</div>
            </div>
        </a>

        <div class="universe-panel foresight locked">
            <div class="bg-image"></div>
            <div class="content">
                <h2>FORESIGHT CHESS <span class="tag-soon">SOON</span></h2>
                <div class="btn">LOCKED</div>
            </div>
        </div>

    </div>

</body>
</html>
