<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoyaltyChess - Hoş Geldiniz</title>
    <style>
        body { 
            
            color: white; 
            text-align: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }

        h1 { 
            font-size: 4rem; 
            letter-spacing: 8px; 
            color: #f1c40f; 
            margin-bottom: 10px;
            font-weight: 900;
        }

        h1 span { color: #ffffff; font-weight: 300; }

        p { 
            font-size: 1.2rem; 
            color: #aaa; 
            margin-bottom: 40px; 
            max-width: 600px;
        }

        .btn-container {
            display: flex; 
            gap: 20px; 
            justify-content: center;
        }

        .btn { 
            padding: 20px 40px; 
            background: #f1c40f; 
            color: #121212; 
            text-decoration: none; 
            font-weight: bold; 
            border: none;
            border-radius: 50px; 
            font-size: 1.2rem; 
            transition: all 0.3s ease; 
            box-shadow: 0 10px 20px rgba(241, 196, 15, 0.2);
            cursor: pointer;
        }

        .btn:hover { 
            background: #d4ac0d; 
            transform: translateY(-5px); 
            box-shadow: 0 15px 30px rgba(241, 196, 15, 0.4);
        }
    </style>
</head>
<body>

    <h1>LOYALTY<span>CHESS</span></h1>
    <p id="welcome-text">İhanetin kural olduğu tek satranç arenasına hoş geldiniz. Hazırsanız hamlenizi yapın.</p>
    
    <div class="btn-container">
        <button onclick="startWithLang('tr')" class="btn">TÜRKÇE OYNA 🇹🇷</button>
        <button onclick="startWithLang('en')" class="btn">PLAY ENGLISH 🇺🇸</button>
    </div>

    <script>
        function startWithLang(lang) {
            // Seçimi kaydet
            localStorage.setItem('gameLang', lang);
            // Oyun sayfasına yönlendir
            window.location.href = 'home.html';
        }
    </script>

</body>
</html>
