<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoyaltyChess - Oyun</title>
    <link rel="stylesheet" href="home_style.css">
    <style>
        /* Butonların yan yana durması için küçük bir ekleme */
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .controls button {
            flex: 1;
            padding: 12px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            border: 1px solid #f1c40f;
            background: #222;
            color: #f1c40f;
            transition: 0.3s;
        }
        .controls button:hover:not(:disabled) {
            background: #f1c40f;
            color: #222;
        }
        .controls button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            border-color: #555;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div id="chess-board"></div>

        <div class="side-panel">
            <div id="status" class="msg-box">Başlamak için butona basın.</div>
            
            <div class="controls">
                <button onclick="prevStep()" id="prev-btn" disabled>Geri</button>
                <button onclick="nextStep()" id="next-btn">Sonraki Hamle</button>
            </div>
            
            <div class="full-rules-panel">
                <h3>📜 İhanet Yasaları</h3>
                <ul id="rules-list">
                    </ul>
            </div>
        </div> 
    </div>

    <div id="betrayal-popup" class="popup-overlay" style="display: none;">
        <div class="popup-content">
            <h2 class="alert-title">⚠️ BİLDİRİM</h2>
            <p id="popup-msg">Mesaj buraya gelecek...</p>
            <div class="popup-rule-box">
                <strong>Kanun:</strong> 
                <span id="popup-rule">Kural açıklaması.</span>
            </div>
            <button onclick="closePopup()" class="popup-btn">ANLADIM</button>
        </div>
    </div>

    <script src="logic_alerts.js"></script>
    <script src="home_script.js"></script>

</body>
</html>
