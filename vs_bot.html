<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoyaltyChess - Oyun</title>
    <link rel="stylesheet" href="home_style.css">
    <style>
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        .controls button {
            flex: 1; padding: 12px; cursor: pointer; font-weight: bold;
            border-radius: 8px; border: 1px solid #f1c40f;
            background: rgba(241, 196, 15, 0.05); color: #f1c40f;
            transition: 0.3s; text-transform: uppercase; font-size: 0.8rem;
        }
        .controls button:hover:not(:disabled) { background: #f1c40f; color: #121212; }
        .controls button:disabled { opacity: 0.2; cursor: not-allowed; color: #555; border-color: #555; }

        /* Log Paneli Tasarımı */
        .log-container { background: rgba(0,0,0,0.3); border-radius: 8px; border: 1px solid #333; margin-bottom: 20px; padding: 10px; }
        .log-title { color: #f1c40f; font-size: 0.9rem; margin: 0 0 10px 0; border-bottom: 1px solid #333; }
        #move-history { height: 150px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 0.85rem; }
        .log-entry { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #222; }
        .symbol-threat { color: #f1c40f; font-weight: bold; } /* ! */
        .symbol-ready { color: #e67e22; font-weight: bold; }  /* † */
        .symbol-betrayal { color: #e74c3c; font-weight: bold; } /* ☠ */

        .full-rules-panel {
            background: rgba(255, 255, 255, 0.03); border-radius: 12px;
            padding: 15px; border: 1px solid rgba(255, 255, 255, 0.1);
            max-height: 300px; overflow-y: auto;
        }
    </style>
</head>

                <h3 class="log-title">⚔️ LOYALTY LOG</h3>
