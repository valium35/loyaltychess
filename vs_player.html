<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoyaltyChess - Player vs Player</title>
    <link rel="stylesheet" href="home_style.css">
    <style>
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        .controls button {
            flex: 1; padding: 12px; cursor: pointer; font-weight: bold;
            border-radius: 8px; border: 1px solid #f1c40f;
            background: rgba(241, 196, 15, 0.05); color: #f1c40f;
            transition: 0.3s; text-transform: uppercase; font-size: 0.8rem;
        }
        .controls button:hover:not(:disabled) { background: #f1c40f; color: #121212; }
        .controls button:disabled { opacity: 0.2; cursor: not-allowed; }

        .full-rules-panel {
            background: rgba(255, 255, 255, 0.03); border-radius: 12px;
            padding: 15px; border: 1px solid rgba(255, 255, 255, 0.1);
            max-height: 400px; overflow-y: auto; margin-top: 10px;
        }
        .full-rules-panel h3 {
            color: #f1c40f; font-size: 1.1rem; margin-top: 0;
            border-bottom: 1px solid rgba(241, 196, 15, 0.3);
            padding-bottom: 10px; text-align: center;
        }
        .law-item { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .law-item strong { display: block; color: #ffffff; font-size: 0.9rem; margin-bottom: 5px; }
        .law-item span { display: block; color: #aaa; font-size: 0.8rem; line-height: 1.4; }

        .restrictions-box {
            margin-top: 15px; padding: 12px; background: rgba(231, 76, 60, 0.08); 
            border: 1px dashed rgba(231, 76, 60, 0.4); border-radius: 8px;
        }
        .restrictions-box h4 { color: #e74c3c; font-size: 0.85rem; margin: 0 0 8px 0; text-transform: uppercase; text-align: center; }
    </style>
</head>
<body>
    <div class="main-container">
        <div id="chess-board"></div>

        <div class="side-panel">
            <div id="status" class="log-container" style="text-align:center; font-weight:bold; color:#f1c40f; font-size: 1.1rem; padding: 15px;">
                Yükleniyor...
            </div>

            <div class="log-container">
                <h3 id="history-title" style="color:#f1c40f; text-align:center; margin-top:0; border-bottom: 1px solid #333; padding-bottom: 10px;">⚔️ LOYALTY LOG</h3>
                <div id="move-history"></div>
            </div>

            <div class="controls">
                <button onclick="location.reload()" id="restart-btn">Yeniden Başlat</button>
                <button onclick="alert('SOON!')" id="undo-btn">Geri Al</button>
            </div>

            <div class="full-rules-panel">
                <h3 id="panel-title">📜 THE 3 LAWS</h3>
                <div class="law-item">
                    <strong id="rule-1-title">⚡ 1. ACTIVE THREAT</strong>
                    <span id="rule-1-desc">...</span>
                </div>
                <div class="law-item">
                    <strong id="rule-2-title">🔄 2. THE CHOICE</strong>
                    <span id="rule-2-desc">...</span>
                </div>
                <div class="law-item">
                    <strong id="rule-3-title">💨 3. FINAL MISSION</strong>
                    <span id="rule-3-desc">...</span>
                </div>
                <div id="restrictions-list" class="restrictions-box"></div>
            </div>
        </div> 
    </div>

    <div id="betrayal-popup" class="popup-overlay" style="display:none;">
        <div class="popup-content">
            <h2 id="alert-title" class="alert-title">⚠️ ALERT</h2>
            <p id="popup-msg">...</p>
            <div style="font-size:0.8rem; color:#aaa; margin:15px 0; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 5px;">
                <strong id="popup-law-label">KURAL:</strong> <span id="popup-rule">...</span>
            </div>
            <button id="popup-confirm-btn" onclick="closePopup()" class="popup-btn">ANLADIM</button>
        </div>
    </div>

    <script src="translations.js"></script>
    <script src="logic_alerts.js"></script>
    <script>
       // Fonksiyonu global yapıyoruz ki her yerden erişilsin
    window.applyPlayerLanguage = function() {
        // LoyaltyDict yüklendi mi kontrol et
        if (typeof LoyaltyDict === 'undefined') {
            console.error("Hata: translations.js yüklenemedi!");
            return;
        }

        const lang = localStorage.getItem('gameLang') || 'tr';
        const t = LoyaltyDict[lang];

        if (t) {
            // Panel Başlıkları ve Butonlar
            const elements = {
                'status': t.status,
                'restart-btn': t.resetBtn,
                'undo-btn': t.undoBtn,
                'history-title': t.historyTitle,
                'panel-title': t.rulesTitle,
                'alert-title': t.popups.alertTitle,
                'popup-law-label': t.popups.lawLabel,
                'popup-confirm-btn': t.popups.confirmBtn
            };

            for (let id in elements) {
                const el = document.getElementById(id);
                if (el) el.innerText = elements[id];
            }

            // Kurallar Listesi
            if (t.rules) {
                for (let i = 0; i < 3; i++) {
                    const el = document.getElementById(`rule-${i+1}-desc`);
                    if (el) el.innerText = t.rules[i];
                }
            }

            // Kısıtlamalar Kutusu
            const resBox = document.getElementById('restrictions-list');
            if (resBox && t.restrictions) {
                let html = `<h4>${t.restrictionsTitle}</h4>`;
                t.restrictions.forEach(r => {
                    html += `<div style="font-size: 0.75rem; color: #eee; margin-bottom: 5px;">• ${r}</div>`;
                });
                resBox.innerHTML = html;
            }
        }
    };

    // Sayfa yüklendiğinde çalıştır
    document.addEventListener("DOMContentLoaded", window.applyPlayerLanguage);
    </script>
    <script src="logic_player.js"></script>
    <script>
        // Oyun motoru yüklendikten SONRA dili bir kez daha zorla güncelle
        if(window.applyPlayerLanguage) window.applyPlayerLanguage();
    </script>
</body>
</html>
