<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoyaltyChess - Player vs Player</title>
    <link rel="stylesheet" href="home_style.css">
    <style>
        /* HTML'e özel ek görsel ayarlar */
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        .controls button {
            flex: 1; padding: 12px; cursor: pointer; font-weight: bold;
            border-radius: 8px; border: 1px solid #f1c40f;
            background: rgba(241, 196, 15, 0.05); color: #f1c40f;
            transition: 0.3s; text-transform: uppercase; font-size: 0.8rem;
        }
        .controls button:hover:not(:disabled) { background: #f1c40f; color: #121212; }
        .controls button:disabled { opacity: 0.2; cursor: not-allowed; }

        /* Üzeri çizili olan kısmı burayla ezebilirsin */
        #move-history .log-entry span {
            display: block !important;
            margin: 8px !important;
        }

        .full-rules-panel {
            background: rgba(255, 255, 255, 0.03); border-radius: 12px;
            padding: 15px; border: 1px solid rgba(255, 255, 255, 0.1);
            max-height: 400px; overflow-y: auto; margin-top: 10px;
        }
        /* ... diğer stiller ... */
    </style>
</head>
<body>
    <div id="betrayal-popup" class="popup-overlay">
        <div class="popup-content">
            <h2 class="alert-title">⚠️ ALERT</h2>
            <p id="popup-msg">...</p>
            <div style="font-size:0.8rem; color:#aaa; margin:15px 0; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 5px;">
                <strong id="popup-law-label">KURAL:</strong> <span id="popup-rule">...</span>
            </div>
            <button onclick="closePopup()" class="popup-btn">ANLADIM</button>
        </div>
    </div>

    <div class="main-container">
        <div id="chess-board"></div>
        <div class="side-panel">
             <div id="status" class="log-container" style="text-align:center; font-weight:bold; color:#f1c40f; font-size: 1.1rem; padding: 15px;">
                Sıra Beyazda...
            </div>
            </div>
    </div>

    <script src="logic_alerts.js"></script>
    <script src="logic_player.js"></script>
</body>
</html>
