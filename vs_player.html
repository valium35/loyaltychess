<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoyaltyChess - Player vs Player</title>
    <link rel="stylesheet" href="home_style.css">
    <style>
        /* PvP'ye Özel Eklemeler */
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        .controls button {
            flex: 1; padding: 12px; cursor: pointer; font-weight: bold;
            border-radius: 8px; border: 1px solid #f1c40f;
            background: rgba(241, 196, 15, 0.05); color: #f1c40f;
            transition: 0.3s; text-transform: uppercase; font-size: 0.8rem;
        }
        .controls button:hover:not(:disabled) { background: #f1c40f; color: #121212; }
        .controls button:disabled { opacity: 0.2; cursor: not-allowed; }

        /* Log ve Geçmiş Paneli */
        .log-container {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        #move-history {
            max-height: 120px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.85rem;
            color: #eee;
        }

        .full-rules-panel {
            background: rgba(255, 255, 255, 0.03); border-radius: 12px;
            padding: 15px; border: 1px solid rgba(255, 255, 255, 0.1);
            max-height: 400px; overflow-y: auto;
        }
        .law-item { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .law-item strong { display: block; color: #ffffff; font-size: 0.9rem; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="main-container">
        <div id="chess-board"></div>

        <div class="side-panel">
            <div id="status" class="msg-box" style="font-size: 1.1rem; text-align: center; color: #f1c40f;">
                Yükleniyor...
            </div>
            
            <div class="log-container">
                <h4 id="historyTitle" style="color:#f1c40f; margin:0 0 10px 0; text-align:center; font-size:0.8rem;">⚔️ MOVES</h4>
                <div id="move-history"></div>
            </div>
            
            <div class="controls">
                <button onclick="location.reload()" id="resetBtn">---</button>
                <button onclick="undoMove()" id="undoBtn">---</button>
            </div>

            <div class="full-rules-panel">
                <h3 id="rulesTitle">---</h3>
                <div class="law-item"><strong>⚡ 1. ACTIVE THREAT</strong><span id="rule-1-desc">...</span></div>
                <div class="law-item"><strong>🔄 2. THE CHOICE</strong><span id="rule-2-desc">...</span></div>
                <div class="law-item"><strong>💨 3. FINAL MISSION</strong><span id="rule-3-desc">...</span></div>
                <div id="restrictions-list" class="restrictions-box"></div>
            </div>
        </div> 
    </div>

    <div id="betrayal-popup" class="popup-overlay" style="display: none;">
        <div class="popup-content">
            <h2 id="alertTitle" class="alert-title">⚠️ ALERT</h2>
            <p id="popup-msg">...</p>
            <div class="popup-rule-box" style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 5px; margin: 10px 0;">
                <strong id="lawLabel">LAW:</strong> <span id="popup-rule">...</span>
            </div>
            <button id="confirmBtn" onclick="closePopup()" class="popup-btn">---</button>
        </div>
    </div>

    <script src="translations.js"></script>
    <script src="logic_player.js"></script> <script>
       window.onload = function() {
    console.log("Sistem: Sayfa yüklendi, dil motoru tetikleniyor...");

    // 1. DİL MOTORUNU ZORLA ÇALIŞTIR
    try {
        if (typeof applyLanguageToPage === 'function') {
            applyLanguageToPage();
            console.log("Sistem: Dil motoru başarıyla çalıştı.");
        } else {
            console.warn("Sistem: applyLanguageToPage fonksiyonu bulunamadı!");
        }
    } catch (err) {
        console.error("Sistem: Dil yüklenirken hata oluştu:", err);
    }

    // 2. OYUN MOTORUNU 100ms GECİKMEYLE BAŞLAT
    // Bu gecikme, dilin yerleşmesi için tarayıcıya nefes aldırır.
    setTimeout(() => {
        if (typeof initGame === 'function') {
            console.log("Sistem: Oyun motoru başlatılıyor...");
            initGame();
        }
    }, 100);
};
    </script>
</body>
</html>
